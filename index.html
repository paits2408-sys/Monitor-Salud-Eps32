<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monitor de Salud ESP32</title>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
  min-height:100vh;
  color:#1a2c4f;
  background:linear-gradient(135deg,#dceeff,#eef7ff);
  overflow-x:hidden;
  position:relative;
}

/* Signos médicos */
.cross{
  position:fixed;
  font-size:80px;
  color:rgba(100,150,255,0.15);
  font-weight:bold;
  z-index:-1;
}
.cross1{top:30px;left:40px;}
.cross2{top:80px;right:60px;}
.cross3{bottom:120px;left:70px;}
.cross4{bottom:60px;right:80px;}

h1{
  margin-top:20px;
  margin-bottom:25px;
  font-size:34px;
}

/* ECG */
.ecg-container{
  width:100%;
  max-width:1000px;
  height:140px;
  margin:20px auto 40px auto;
}
.ecg-path{
  fill:none;
  stroke:#5c8de8;
  stroke-width:4;
  stroke-dasharray:1200;
  stroke-dashoffset:1200;
  animation:ecgMove 3s linear infinite;
}

@keyframes ecgMove{
  from{stroke-dashoffset:1200;}
  to{stroke-dashoffset:0;}
}

/* Tarjetas */
.card{
  background:white;
  padding:18px;
  margin:15px auto;
  border-radius:16px;
  max-width:420px;
  box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.emergencia{color:red;font-size:24px;font-weight:bold;}
.normal{color:green;font-size:22px;font-weight:bold;}
</style>
</head>

<body>

<!-- Fondo -->
<div class="cross cross1">+</div>
<div class="cross cross2">+</div>
<div class="cross cross3">+</div>
<div class="cross cross4">+</div>

<h1>Monitor de Salud ESP32</h1>

<!-- ECG -->
<div class="ecg-container">
<svg viewBox="0 0 1000 140">
<path class="ecg-path"
d="M0 70 L120 70 L150 70 L180 35 L210 105 L240 20 L270 70 L400 70
L430 70 L460 40 L490 100 L520 25 L550 70 L1000 70"/>
</svg>
</div>

<!-- Paciente -->
<div class="card">
<h2>Paciente</h2>
<p><b>Nombre:</b> <span id="nombre">--</span></p>
<p><b>Edad:</b> <span id="edad">--</span></p>
<p><b>Tipo de sangre:</b> <span id="sangre">--</span></p>
</div>

<!-- BPM -->
<div class="card">
<h2>BPM</h2>
<p><span id="bpm">--</span></p>
</div>

<!-- SpO2 -->
<div class="card">
<h2>SpO2</h2>
<p><span id="spo2">--</span> %</p>
</div>

<!-- Estado -->
<div class="card">
<h2>Estado</h2>
<p id="estado" class="normal">--</p>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmnBU4vvv5Sz9G6ywHJYQqiBnfe5Q2vu4",
  authDomain: "monitor-salud-esp32.firebaseapp.com",
  databaseURL: "https://monitor-salud-esp32-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "monitor-salud-esp32"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// PACIENTE
onValue(ref(db, 'paciente/nombre'), snap=>{
  document.getElementById("nombre").innerText = snap.val();
});

onValue(ref(db, 'paciente/edad'), snap=>{
  document.getElementById("edad").innerText = snap.val();
});

onValue(ref(db, 'paciente/sangre'), snap=>{
  document.getElementById("sangre").innerText = snap.val();
});  

// MEDICIÓN
onValue(ref(db, 'medicion/bpm'), snap=>{
  document.getElementById("bpm").innerText = snap.val();
});

onValue(ref(db, 'medicion/spo2'), snap=>{
  document.getElementById("spo2").innerText = snap.val();
});

onValue(ref(db, 'medicion/estado'), snap=>{
  let estado = snap.val();
  let elemento = document.getElementById("estado");

  elemento.innerText = estado;

  if(estado === "EMERGENCIA"){
    elemento.className = "emergencia";
  }else{
    elemento.className = "normal";
  }
});

</script>

</body>
</html>
